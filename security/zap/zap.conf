# ZAP baseline config: one line per rule. Format is TAB-separated:
#   ruleId	ACTION	optional message
# ACTION = FAIL | WARN | INFO | IGNORE
# Generate a full template: docker run -v $(pwd):/zap/wrk ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t https://example.com -g /zap/wrk/zap-generated.conf
#
# Optional: add lines below to downgrade noisy rules (e.g. IGNORE). Then pass -c zap.conf in run-baseline.sh.
# Example (rule 10021 = Content-Type header missing):
# 10021	IGNORE	Known false positive in our stack

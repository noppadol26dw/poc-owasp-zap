# OWASP ZAP baseline scan on push/PR. Set STAGING_URL in repo vars or env.
# Security gate: fails on HIGH/CRITICAL (shift-left DAST).
# DISABLED - Re-enable by uncommenting the 'on:' section below
name: ZAP Baseline Scan
# on:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]

on: []  # Disabled - no triggers

permissions:
  contents: read
  actions: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    env:
      STAGING_URL: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Require STAGING_URL
        run: |
          if [[ -z "${{ vars.STAGING_URL }}" ]]; then
            echo "::error::STAGING_URL is not set. Add it in Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          echo "Target: ${{ vars.STAGING_URL }}"

      - name: ZAP Baseline Scan
        run: |
          chmod +x security/zap/run-baseline.sh
          security/zap/run-baseline.sh

      - name: Upload ZAP report
        if: always() && hashFiles('reports/zap_baseline_report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            reports/zap_baseline_report.json
            reports/zap_baseline_risk-confidence.html
